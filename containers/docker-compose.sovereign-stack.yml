# EPOS Sovereign Workspace Stack
# Constitutional Authority: EPOS_CONSTITUTION_v3.1 Articles V, X, XIV, XVI §1
#
# BUILDS 61, 62, 63:
#   - AFFiNE (self-hosted workspace + client portal)
#   - Cal.com (self-hosted scheduling + webhook → Event Bus)
#   - Undb (self-hosted database — CRM + pipeline + calendar)
#
# Compose is a sibling of docker-compose.yml; overlay-merge to add:
#     docker compose -f docker-compose.yml -f containers/docker-compose.sovereign-stack.yml up -d
#
# Persist all state to ./data volumes for per-machine-portability.
# Network: epos-net (shared with existing stack).

version: "3.9"

networks:
  epos-net:
    external: true

services:

  # ──────────────────────────────────────────────────────────
  # BUILD 61 — AFFiNE (workspace + client portal)
  # Canvas-based, dark-mode default, 5 realms ready.
  # Port 3010 external; UI at http://localhost:3010
  # ──────────────────────────────────────────────────────────
  affine:
    image: ghcr.io/toeverything/affine-graphql:stable
    container_name: epos-affine
    restart: unless-stopped
    networks: [epos-net]
    ports:
      - "${AFFINE_PORT:-3010}:3010"
    environment:
      NODE_ENV: production
      AFFINE_SERVER_HOST: ${AFFINE_HOST:-0.0.0.0}
      AFFINE_SERVER_PORT: "3010"
      AFFINE_SERVER_EXTERNAL_URL: ${AFFINE_EXTERNAL_URL:-http://localhost:3010}
      DATABASE_URL: postgresql://${PG_USER:-postgres}:${PG_PASSWORD}@postgres:5432/affine
      # Dark canvas default; workspace realms seeded on first boot
      AFFINE_CANVAS_THEME: dark
    volumes:
      - ./data/affine:/root/.affine
    depends_on:
      - postgres

  # ──────────────────────────────────────────────────────────
  # BUILD 62 — Cal.com (scheduling + webhooks)
  # Port 3020 external; webhook target pointed at Event Bus.
  # ──────────────────────────────────────────────────────────
  calcom:
    image: calcom/cal.com:latest
    container_name: epos-calcom
    restart: unless-stopped
    networks: [epos-net]
    ports:
      - "${CALCOM_PORT:-3020}:3000"
    environment:
      NEXTAUTH_SECRET: ${CALCOM_SECRET}
      CALENDSO_ENCRYPTION_KEY: ${CALCOM_ENCRYPTION_KEY}
      DATABASE_URL: postgresql://${PG_USER:-postgres}:${PG_PASSWORD}@postgres:5432/calcom
      NEXTAUTH_URL: ${CALCOM_EXTERNAL_URL:-http://localhost:3020}
      # Webhook target: Event Bus / epos-api-core (internal)
      CAL_WEBHOOK_TARGET: http://epos-api-core:8001/webhooks/calcom
    volumes:
      - ./data/calcom:/calcom/data
    depends_on:
      - postgres

  # ──────────────────────────────────────────────────────────
  # BUILD 63 — Undb (self-hosted sovereign database — CRM/pipeline/calendar)
  # Port 3030 external. Spreadsheet-like UI + REST + webhooks.
  # ──────────────────────────────────────────────────────────
  undb:
    image: undb/undb:latest
    container_name: epos-undb
    restart: unless-stopped
    networks: [epos-net]
    ports:
      - "${UNDB_PORT:-3030}:3000"
    environment:
      UNDB_DB_URL: postgresql://${PG_USER:-postgres}:${PG_PASSWORD}@postgres:5432/undb
      UNDB_JWT_SECRET: ${UNDB_JWT_SECRET}
    volumes:
      - ./data/undb:/app/data
    depends_on:
      - postgres

  # Required databases for AFFiNE/Cal.com/Undb — postgres shared with main stack
  # (assumed running from the main docker-compose.yml)

# Optional: reverse proxy in front of all three via Caddy. Add when going
# public / needing HTTPS across the three services.
