<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPOS — The Lens That Reveals</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'%3E%3Ccircle cx='100' cy='100' r='65' stroke='%234A6CF7' stroke-width='2' fill='none'/%3E%3Cpath d='M100 70 L125 100 L100 130 L75 100 Z' fill='%237AE7FF'/%3E%3Ccircle cx='100' cy='100' r='3' fill='%237AE7FF'/%3E%3C/svg%3E">
    <style>
        body { background: #0B0F14; color: #F5F7FA; font-family: 'Inter', sans-serif; margin: 0; }
        .nav { padding: 20px 40px; border-bottom: 1px solid rgba(74, 108, 247, 0.2); display: flex; align-items: center; justify-content: space-between; }
        .hero { min-height: 90vh; display: grid; grid-template-columns: 1fr 1fr; align-items: center; max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        h1 { font-size: 64px; line-height: 1.1; margin-bottom: 24px; }
        .key-art { width: 100%; border-radius: 16px; border: 1px solid rgba(74, 108, 247, 0.3); box-shadow: 0 0 40px rgba(74, 108, 247, 0.2); }
        .btn { background: #4A6CF7; color: white; padding: 12px 24px; text-decoration: none; border-radius: 8px; font-weight: bold; }
        @media (max-width: 768px) { .hero { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="nav">
        <svg width="40" height="40" viewBox="0 0 200 200"><circle cx="100" cy="100" r="65" stroke="#4A6CF7" stroke-width="4" fill="none"/><path d="M100 70 L125 100 L100 130 L75 100 Z" fill="#7AE7FF"/></svg>
        <a href="#products" style="color: white; text-decoration: none;">Products</a>
    </div>
    <div class="hero">
        <div>
            <h1>The lens that <span style="color: #7AE7FF">reveals.</span></h1>
            <p style="font-size: 20px; color: #8899A6; margin-bottom: 32px;">EPOS is the looking glass that reveals adaptive systems in their essence.</p>
            <a href="#products" class="btn">Get Started</a>
        </div>
        <img src="assets/images/epos_portal_keyart.jpg" class="key-art" alt="EPOS Portal">
    </div>
</body>
</html>
