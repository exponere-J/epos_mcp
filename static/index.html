<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EPOS SOVEREIGN CANVAS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .canvas-grid { background-image: radial-gradient(#2d3748 1px, transparent 1px); background-size: 20px 20px; }
        .tile-active { border-color: #48bb78; box-shadow: 0 0 15px rgba(72, 187, 120, 0.3); }
    </style>
</head>
<body class="bg-slate-900 text-white canvas-grid min-h-screen">
    <header class="p-4 bg-slate-800 border-b border-slate-700 flex justify-between items-center">
        <h1 class="text-xl font-bold tracking-tighter">EPOS COMMAND CENTER <span class="text-green-500">V2</span></h1>
        <div id="status-beacon" class="px-3 py-1 rounded bg-green-900 text-green-400 border border-green-500 text-xs">BUS CONNECTED</div>
    </header>

    <main class="p-8 grid grid-cols-1 md:grid-cols-3 gap-6" id="kanban-tiles">
        </main>

    <aside class="fixed right-0 top-16 bottom-0 w-80 bg-slate-800 border-l border-slate-700 p-4 hidden" id="chat-portal">
        <div class="h-full flex flex-col">
            <div id="chat-header" class="font-bold border-b border-slate-600 pb-2 mb-4">Global Chat</div>
            <div id="chat-history" class="flex-grow overflow-y-auto space-y-2 text-sm"></div>
            <input type="text" id="chat-input" class="w-full bg-slate-700 p-2 rounded mt-4" placeholder="Command...">
        </div>
    </aside>

    <script src="/static/canvas.js"></script>
</body>
</html>
