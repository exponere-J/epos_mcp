<svg width="512" height="512" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .lens-frame { fill: none; stroke: #4A6CF7; stroke-width: 2; }
      .core-gem   { fill: none; stroke: #7AE7FF; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      .refraction { fill: none; stroke: #4A6CF7; stroke-width: 1; opacity: 0.5; }
      .focal-point{ fill: #7AE7FF; }
      .highlight  { fill: none; stroke: #7AE7FF; stroke-width: 1; opacity: 0.6; }
    </style>
  </defs>

  <circle cx="100" cy="100" r="65" class="lens-frame"/>

  <path d="M100 75 L115 100 L100 125 L85 100 Z" class="core-gem"/>

  <line x1="100" y1="85" x2="100" y2="75" class="highlight"/> <line x1="100" y1="125" x2="100" y2="115" class="highlight"/> <line x1="85" y1="100" x2="93" y2="100" class="highlight"/> <line x1="107" y1="100" x2="115" y2="100" class="highlight"/> <line x1="60" y1="60" x2="90" y2="90" class="refraction"/>
  <line x1="140" y1="60" x2="110" y2="90" class="refraction"/>
  <line x1="60" y1="140" x2="90" y2="110" class="refraction"/>
  <line x1="140" y1="140" x2="110" y2="110" class="refraction"/>

  <line x1="100" y1="30" x2="100" y2="40" class="refraction"/>
  <line x1="100" y1="160" x2="100" y2="170" class="refraction"/>
  <line x1="30" y1="100" x2="40" y2="100" class="refraction"/>
  <line x1="160" y1="100" x2="170" y2="100" class="refraction"/>

  <circle cx="100" cy="100" r="2.5" class="focal-point"/>

</svg>