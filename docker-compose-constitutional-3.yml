version: '3.8'

networks:
  epos_network:
    driver: bridge

volumes:
  context_vault_data:
  event_bus_data:

services:
  # Layer 0: Event Bus (Foundation)
  event-bus:
    build:
      context: .
      dockerfile: containers/event-bus/Dockerfile
    container_name: epos-event-bus
    networks:
      - epos_network
    ports:
      - "8100:8100"
    volumes:
      - event_bus_data:/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # Layer 1: Governance Server
  governance-server:
    build:
      context: .
      dockerfile: containers/governance/Dockerfile
    container_name: epos-governance
    networks:
      - epos_network
    ports:
      - "8101:8101"
    volumes:
      - ./context_vault:/app/context_vault
      - ./logs:/app/logs
    environment:
      - EVENT_BUS_URL=http://event-bus:8100
      - CONSTITUTION_PATH=/app/EPOS_CONSTITUTION_v3.1.md
    depends_on:
      event-bus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8101/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # Layer 1: Learning Server
  learning-server:
    build:
      context: .
      dockerfile: containers/learning/Dockerfile
    container_name: epos-learning
    networks:
      - epos_network
    ports:
      - "8102:8102"
    volumes:
      - ./context_vault:/app/context_vault
      - ./logs:/app/logs
    environment:
      - EVENT_BUS_URL=http://event-bus:8100
    depends_on:
      event-bus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8102/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # Layer 1: Context Server
  context-server:
    build:
      context: .
      dockerfile: containers/context/Dockerfile
    container_name: epos-context
    networks:
      - epos_network
    ports:
      - "8103:8103"
    volumes:
      - context_vault_data:/app/data
      - ./context_vault:/app/context_vault
      - ./logs:/app/logs
    environment:
      - EVENT_BUS_URL=http://event-bus:8100
    depends_on:
      event-bus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8103/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # Layer 2: JARVIS Bridge (Agent Zero Integration)
  jarvis-bridge:
    build:
      context: .
      dockerfile: containers/jarvis/Dockerfile
    container_name: epos-jarvis-bridge
    networks:
      - epos_network
    ports:
      - "8104:8104"
    volumes:
      - ./context_vault:/app/context_vault
      - ./logs:/app/logs
      - ./inbox:/app/inbox
    environment:
      - EVENT_BUS_URL=http://event-bus:8100
      - GOVERNANCE_URL=http://governance-server:8101
      - LEARNING_URL=http://learning-server:8102
      - CONTEXT_URL=http://context-server:8103
    depends_on:
      governance-server:
        condition: service_healthy
      learning-server:
        condition: service_healthy
      context-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8104/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 45s
    restart: unless-stopped

  # Layer 3: Command Center (Dashboard/UI)
  command-center:
    build:
      context: .
      dockerfile: containers/command-center/Dockerfile
    container_name: epos-command-center
    networks:
      - epos_network
    ports:
      - "8106:8106"
    volumes:
      - ./context_vault:/app/context_vault:ro
      - ./logs:/app/logs:ro
    environment:
      - EVENT_BUS_URL=http://event-bus:8100
      - GOVERNANCE_URL=http://governance-server:8101
      - JARVIS_URL=http://jarvis-bridge:8104
    depends_on:
      jarvis-bridge:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8106/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
