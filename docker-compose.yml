# =============================================================================
# EPOS SOVEREIGN STACK — docker-compose.yml
# 14-service organism | Updated: 2026-04-08 (M6 Docker migration)
#
# SERVICES:
#   postgres        — Foundation database (5432)
#   ollama          — Local LLM backend (11434)
#   litellm         — LLM proxy router (4000)
#   epos-core       — Command center API (8001)
#   friday          — Friday orchestrator (8090)
#   epos-daemon     — APScheduler daemon (no port)
#   governance-gate — Constitution enforcement gate (8101)
#   governance-srv  — Governance server (8108)
#   context-server  — Context vault server (8103)
#   immune-monitor  — System health monitor (8104)
#   learning-server — Learning server (8102)
#   agent-zero      — Execution meta-agent (50080)
#   nocodb          — Sovereign Airtable replacement (8080)
#   n8n             — Workflow automation engine (5678)
#
# VOLUMES:
#   context_vault   — Shared event bus + context (bind: ./context_vault)
#   epos-pg-data    — PostgreSQL persistence
#   epos-ollama-data— Ollama model storage
#   epos-nocodb-data— NocoDB data
#   epos-n8n-data   — n8n workflow data
#
# DEPLOYMENT:
#   docker compose up -d
# =============================================================================

# =============================================================================
# NETWORK
# =============================================================================
networks:
  epos-net:
    driver: bridge
    name: epos-network

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  epos-pg-data:
    name: epos-pg-data
  epos-ollama-data:
    name: epos-ollama-data
  epos-nocodb-data:
    name: epos-nocodb-data
  epos-n8n-data:
    name: epos-n8n-data
  # Shared context vault — all services read/write the event bus here
  context_vault:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${CONTEXT_VAULT_PATH:-./context_vault}

# =============================================================================
# COMMON ENVIRONMENT ANCHORS
# =============================================================================
x-epos-env: &epos-env
  EPOS_ROOT: /app
  LLM_MODE: ${LLM_MODE:-groq_direct}
  GROQ_API_KEY: ${GROQ_API_KEY:-}
  LITELLM_URL: http://litellm:4000
  OLLAMA_HOST: http://ollama:11434
  AGENT_ZERO_URL: http://agent-zero:8105
  GOVERNANCE_GATE_URL: http://governance-gate:8101
  GOVERNANCE_SERVER_URL: http://governance-srv:8101
  CONTEXT_SERVER_URL: http://context-server:8103
  N8N_URL: http://n8n:5678
  NOCODB_URL: http://nocodb:8080
  NOCODB_API_TOKEN: ${NOCODB_API_TOKEN:-}

# =============================================================================
# SERVICES
# =============================================================================
services:

  # ---------------------------------------------------------------------------
  # LAYER 1: POSTGRESQL
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: epos-postgres
    restart: unless-stopped
    networks:
      - epos-net
    ports:
      - "${PG_PORT:-5432}:5432"
    volumes:
      - epos-pg-data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    environment:
      POSTGRES_USER: ${PG_USER:-epos_admin}
      POSTGRES_PASSWORD: ${PG_PASSWORD:?PG_PASSWORD must be set}
      POSTGRES_DB: epos
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-epos_admin} -d epos"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # LAYER 2: OLLAMA — Local LLM Backend
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: epos-ollama
    restart: unless-stopped
    networks:
      - epos-net
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - epos-ollama-data:/root/.ollama
    # GPU passthrough — uncomment if NVIDIA Container Toolkit is configured:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # ---------------------------------------------------------------------------
  # LAYER 3: LITELLM — LLM Proxy Router
  # Routes: Groq (cloud) ↔ Ollama (local) via LLM_MODE env var
  # ---------------------------------------------------------------------------
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: epos-litellm
    restart: unless-stopped
    networks:
      - epos-net
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      OLLAMA_API_BASE: http://ollama:11434
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-epos-litellm-key}
    command: ["--port", "4000", "--model", "ollama/phi3:mini", "--model", "groq/llama3-8b-8192"]
    depends_on:
      - ollama

  # ---------------------------------------------------------------------------
  # LAYER 4: EPOS CORE — Command Center API
  # Main FastAPI service. Built from root Dockerfile.
  # ---------------------------------------------------------------------------
  epos-core:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: epos-core
    restart: unless-stopped
    networks:
      - epos-net
    ports:
      - "${EPOS_API_PORT:-8001}:8001"
    volumes:
      - context_vault:/app/context_vault
      - ./logs:/app/logs
    environment:
      <<: *epos-env
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
      litellm:
        condition: service_started

  # ---------------------------------------------------------------------------
  # LAYER 5: FRIDAY — Orchestrator API
  # LangGraph StateGraph — routes 7 mission types.
  # ---------------------------------------------------------------------------
  friday:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: epos-friday
    restart: unless-stopped
    networks:
      - epos-net
    ports:
      - "${FRIDAY_PORT:-8090}:8090"
    volumes:
      - context_vault:/app/context_vault
      - ./logs:/app/logs
    environment:
      <<: *epos-env
    command: ["uvicorn", "friday.api:app", "--host", "0.0.0.0", "--port", "8090"]
    depends_on:
      - epos-core

  # ---------------------------------------------------------------------------
  # LAYER 6: EPOS DAEMON — Background Scheduler
  # APScheduler: daily anchors, flywheel checks, KIL scans, event reactor.
  # No HTTP port — long-running process.
  # ---------------------------------------------------------------------------
  epos-daemon:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: epos-daemon
    restart: unless-stopped
    networks:
      - epos-net
    volumes:
      - context_vault:/app/context_vault
      - ./logs:/app/logs
    environment:
      <<: *epos-env
    command: ["python", "epos_daemon.py"]
    depends_on:
      - epos-core

  # ---------------------------------------------------------------------------
  # LAYER 7: GOVERNANCE GATE — Constitution Enforcement
  # ---------------------------------------------------------------------------
  governance-gate:
    build:
      context: ./containers/governance-gate
    container_name: epos-governance-gate
    restart: unless-stopped
    networks:
      - epos-net
    ports:
      - "${GOVERNANCE_GATE_PORT:-8101}:8101"
    volumes:
      - context_vault:/app/context_vault
    environment:
      EPOS_ROOT: /app
      EPOS_CORE_URL: http://epos-core:8001
    depends_on:
      - epos-core

  # ---------------------------------------------------------------------------
  # LAYER 8: GOVERNANCE SERVER
  # ---------------------------------------------------------------------------
  governance-srv:
    build:
      context: ./containers/governance-server
    container_name: epos-governance-srv
    restart: unless-stopped
    networks:
      - epos-net
    ports:
      - "${GOVERNANCE_SRV_PORT:-8108}:8101"
    volumes:
      - context_vault:/app/context_vault
    environment:
      EPOS_ROOT: /app
    depends_on:
      - governance-gate

  # ---------------------------------------------------------------------------
  # LAYER 9: CONTEXT SERVER
  # ---------------------------------------------------------------------------
  context-server:
    build:
      context: ./containers/context-server
    container_name: epos-context-server
    restart: unless-stopped
    networks:
      - epos-net
    ports:
      - "${CONTEXT_SERVER_PORT:-8103}:8103"
    volumes:
      - context_vault:/app/context_vault
    environment:
      EPOS_ROOT: /app
    depends_on:
      - epos-core

  # ---------------------------------------------------------------------------
  # LAYER 10: IMMUNE MONITOR — System Health
  # ---------------------------------------------------------------------------
  immune-monitor:
    build:
      context: ./containers/immune-monitor
    container_name: epos-immune-monitor
    restart: unless-stopped
    networks:
      - epos-net
    ports:
      - "${IMMUNE_MONITOR_PORT:-8104}:8104"
    volumes:
      - context_vault:/app/context_vault
    environment:
      EPOS_ROOT: /app
      EPOS_CORE_URL: http://epos-core:8001
    depends_on:
      - epos-core

  # ---------------------------------------------------------------------------
  # LAYER 11: LEARNING SERVER
  # ---------------------------------------------------------------------------
  learning-server:
    build:
      context: ./containers/learning-server
    container_name: epos-learning-server
    restart: unless-stopped
    networks:
      - epos-net
    ports:
      - "${LEARNING_SERVER_PORT:-8102}:8102"
    volumes:
      - context_vault:/app/context_vault
    environment:
      EPOS_ROOT: /app
    depends_on:
      - epos-core

  # ---------------------------------------------------------------------------
  # LAYER 12: AGENT ZERO — Execution Meta-Agent
  # ---------------------------------------------------------------------------
  agent-zero:
    build:
      context: ./containers/agent-zero
    container_name: epos-agent-zero
    restart: unless-stopped
    networks:
      - epos-net
    ports:
      - "${AZ_PORT:-50080}:8105"
    volumes:
      - context_vault:/app/epos/context_vault:ro
      - ./logs/az:/app/epos/logs
    environment:
      CHAT_MODEL_URL: http://ollama:11434
      UTILITY_MODEL_URL: http://ollama:11434
      EMBEDDING_MODEL_URL: http://ollama:11434
      NOCODB_URL: http://nocodb:8080
      NOCODB_API_TOKEN: ${NOCODB_API_TOKEN:-}
      N8N_WEBHOOK_BASE: http://n8n:5678/webhook
    depends_on:
      - ollama
      - nocodb

  # ---------------------------------------------------------------------------
  # LAYER 13: NOCODB — Sovereign Airtable Replacement
  # ---------------------------------------------------------------------------
  nocodb:
    image: nocodb/nocodb:latest
    container_name: epos-nocodb
    restart: unless-stopped
    networks:
      - epos-net
    ports:
      - "${NOCODB_PORT:-8080}:8080"
    volumes:
      - epos-nocodb-data:/usr/app/data
    environment:
      NC_DB: "pg://postgres:5432?u=${PG_USER:-epos_admin}&p=${PG_PASSWORD}&d=epos"
      NC_AUTH_JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      NC_PUBLIC_URL: ${NOCODB_PUBLIC_URL:-http://localhost:8080}
      NC_DISABLE_TELE: "true"
    depends_on:
      postgres:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # LAYER 14: N8N — Workflow Automation Engine
  # ---------------------------------------------------------------------------
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: epos-n8n
    restart: unless-stopped
    networks:
      - epos-net
    ports:
      - "${N8N_PORT:-5678}:5678"
    volumes:
      - epos-n8n-data:/home/node/.n8n
      - context_vault:/data/context_vault:ro
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: ${PG_USER:-epos_admin}
      DB_POSTGRESDB_PASSWORD: ${PG_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?N8N_ENCRYPTION_KEY must be set}
      N8N_SECURE_COOKIE: "true"
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost:5678/}
      GENERIC_TIMEZONE: ${TZ:-America/New_York}
    depends_on:
      postgres:
        condition: service_healthy
