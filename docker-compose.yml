# ============================================================================
# EPOS SOVEREIGN STACK — docker-compose.yml
# File: C:\Users\Jamie\workspace\epos_mcp\docker-compose.yml
#
# CONSTITUTIONAL AUTHORITY: EPOS Constitution v3.1, Article X (Vendor Integration)
# SOVEREIGNTY: All data stays on YOUR infrastructure. Zero vendor lock-in.
#
# SERVICES:
#   postgres    — Foundation database (port 5432)
#   nocodb      — Sovereign Airtable replacement (port 8080)
#   n8n         — Workflow automation engine (port 5678)
#   ollama      — Local LLM backend for Phi-3 (port 11434)
#   agent-zero  — Execution meta-agent (port 50080)
#   epos-api    — EPOS governance API (port 8001)
#
# DEPLOYMENT:
#   docker compose up -d
#
# PRE-FLIGHT:
#   1. Copy .env.docker to .env and fill in secrets
#   2. Ensure Docker Desktop is running with WSL2 backend
#   3. Run: docker compose config (validate before launch)
# ============================================================================

version: "3.8"

# ==========================================================================
# SHARED NETWORK — All EPOS services communicate here
# ==========================================================================
networks:
  epos-net:
    driver: bridge
    name: epos-network

# ==========================================================================
# PERSISTENT VOLUMES — Data survives container restarts
# ==========================================================================
volumes:
  epos-pg-data:
    name: epos-pg-data
  epos-nocodb-data:
    name: epos-nocodb-data
  epos-n8n-data:
    name: epos-n8n-data
  epos-ollama-data:
    name: epos-ollama-data

# ==========================================================================
# SERVICES
# ==========================================================================
services:

  # ========================================================================
  # LAYER 1: POSTGRESQL — Foundation Database
  # ========================================================================
  # Single source of truth for all structured EPOS data.
  # NocoDB connects on top as the visual interface.
  # n8n uses a separate database within the same instance.
  # ========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: epos-postgres
    restart: unless-stopped
    networks:
      - epos-net
    ports:
      - "${PG_PORT:-5432}:5432"
    volumes:
      - epos-pg-data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    environment:
      POSTGRES_USER: ${PG_USER:-epos_admin}
      POSTGRES_PASSWORD: ${PG_PASSWORD:?PG_PASSWORD must be set}
      POSTGRES_DB: epos
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-epos_admin} -d epos"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ========================================================================
  # LAYER 2: NOCODB — Sovereign Airtable Replacement
  # ========================================================================
  # Open-source spreadsheet-database interface on top of PostgreSQL.
  # Grid, Kanban, Gallery, Form, Calendar views.
  # REST API for Agent Zero integration.
  # Webhooks fire to n8n on record create/update/delete.
  # ========================================================================
  nocodb:
    image: nocodb/nocodb:latest
    container_name: epos-nocodb
    restart: unless-stopped
    networks:
      - epos-net
    ports:
      - "${NOCODB_PORT:-8080}:8080"
    volumes:
      - epos-nocodb-data:/usr/app/data
    environment:
      NC_DB: "pg://postgres:5432?u=${PG_USER:-epos_admin}&p=${PG_PASSWORD}&d=epos"
      NC_AUTH_JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      NC_PUBLIC_URL: ${NOCODB_PUBLIC_URL:-http://localhost:8080}
      NC_DISABLE_TELE: "true"
      NC_MIN: "false"
    depends_on:
      postgres:
        condition: service_healthy

  # ========================================================================
  # LAYER 3: N8N — Workflow Automation Engine
  # ========================================================================
  # Self-hosted automation with 400+ integrations.
  # Native NocoDB node for direct database operations.
  # Webhook receiver for Event Bus integration.
  # JavaScript/Python execution nodes for custom EPOS logic.
  # ========================================================================
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: epos-n8n
    restart: unless-stopped
    networks:
      - epos-net
    ports:
      - "${N8N_PORT:-5678}:5678"
    volumes:
      - epos-n8n-data:/home/node/.n8n
      # Mount Context Vault for n8n file operations
      - ./context_vault:/data/context_vault:ro
    environment:
      # Database — uses same PostgreSQL instance, separate database
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: ${PG_USER:-epos_admin}
      DB_POSTGRESDB_PASSWORD: ${PG_PASSWORD}
      # Security
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?N8N_ENCRYPTION_KEY must be set}
      N8N_SECURE_COOKIE: "true"
      # Webhooks — NocoDB fires events here
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost:5678/}
      # Timezone
      GENERIC_TIMEZONE: ${TZ:-America/New_York}
    depends_on:
      postgres:
        condition: service_healthy

  # ========================================================================
  # LAYER 4: OLLAMA — Local LLM Backend
  # ========================================================================
  # Runs Phi-3 Mini and other models locally.
  # Data sovereignty: no API calls leave the perimeter.
  # GPU passthrough via NVIDIA Container Toolkit (if available).
  # Falls back to CPU if no GPU detected.
  # ========================================================================
  ollama:
    image: ollama/ollama:latest
    container_name: epos-ollama
    restart: unless-stopped
    networks:
      - epos-net
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - epos-ollama-data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # NOTE: If no NVIDIA GPU, remove the deploy.resources block above
    # and Ollama will run on CPU. Slower but functional.

  # ========================================================================
  # LAYER 5: AGENT ZERO — Execution Meta-Agent
  # ========================================================================
  # EPOS execution spine. Processes mission prompts via monologue loop.
  # Mounts to host workspace for file access.
  # Connects to Ollama for local LLM, to NocoDB for data operations.
  # ========================================================================
  agent-zero:
    build:
      context: ../agent-zero
      dockerfile: DockerfileLocal
    container_name: epos-agent-zero
    restart: unless-stopped
    networks:
      - epos-net
    ports:
      - "${AZ_PORT:-50080}:50080"
    volumes:
      # AZ needs read/write to its own workspace
      - ../agent-zero/work_dir:/app/work_dir
      - ../agent-zero/logs:/app/logs
      - ../agent-zero/memory:/app/memory
      - ../agent-zero/knowledge:/app/knowledge
      - ../agent-zero/prompts:/app/prompts
      # AZ needs read access to EPOS mission files and Context Vault
      - ./context_vault:/app/epos/context_vault:ro
      - ./logs/az:/app/epos/logs
    environment:
      # LLM — point to Ollama container, not localhost
      CHAT_MODEL_URL: http://ollama:11434
      UTILITY_MODEL_URL: http://ollama:11434
      EMBEDDING_MODEL_URL: http://ollama:11434
      # NocoDB API — for direct data operations
      NOCODB_URL: http://nocodb:8080
      NOCODB_API_TOKEN: ${NOCODB_API_TOKEN:-}
      # n8n webhooks — for triggering automation workflows
      N8N_WEBHOOK_BASE: http://n8n:5678/webhook
    depends_on:
      - ollama
      - nocodb

  # ========================================================================
  # LAYER 6: EPOS API — Governance & Mission Control
  # ========================================================================
  # FastAPI service exposing /health, /mission, /governance endpoints.
  # Runs epos_doctor.py as pre-flight check on startup.
  # Constitutional enforcement layer.
  # ========================================================================
  epos-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: epos-api
    restart: unless-stopped
    networks:
      - epos-net
    ports:
      - "${EPOS_API_PORT:-8001}:8001"
    volumes:
      # Full read/write access to EPOS workspace
      - .:/app/epos_mcp
      - ./context_vault:/app/epos_mcp/context_vault
      - ./logs:/app/epos_mcp/logs
    environment:
      EPOS_ROOT: /app/epos_mcp
      AGENT_ZERO_URL: http://agent-zero:50080
      NOCODB_URL: http://nocodb:8080
      NOCODB_API_TOKEN: ${NOCODB_API_TOKEN:-}
      N8N_URL: http://n8n:5678
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-phi3:mini}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      - postgres
      - nocodb
      - n8n
      - ollama
      - agent-zero
